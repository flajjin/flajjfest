<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Schedule</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="schedule-panel" aria-labelledby="schedule-title">
        <header class="panel-header">
          <div class="header-logo">
            <img id="site-logo" class="site-logo" src="img/logo.svg" width="436" height="180" alt="Event Schedule logo">
          </div>
          <div class="header-main">
            <div class="header-title">
              <h1 id="schedule-title">Event Schedule</h1>
            </div>
            <div class="time-card" aria-live="polite">
              <span class="time-label">Your time</span>
              <span id="local-clock">--:--</span>
            </div>
          </div>
        </header>

        <div id="schedule-list" class="schedule-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="js/app.js" type="module"></script>
  </body>
</html>
